source:
  type: "localServerPack"
  path: "./packs/latest-server-pack.zip"
minecraftVersion: "1.21.1"
serverDir: "/server"
javaPath: "java"
javaOpts: "-Xmx4G -Xms2G"
updatePolicy:
  mode: "delta"
  removeMissing: false
  preferServerPack: true
  rollbackOnFailure: true
  startupValidationSeconds: 20
backupPolicy:
  enabled: true
  keepLast: 3
  includeWorld: true
  includeConfig: true
